{% extends 'base.html' %}
{% load static %}

{% block main_content %}
<!-- Carousel -->
<div id="carouselExampleIndicators" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="{% static 'website/images/mobile-1.jpg' %}" class="d-block w-100" alt="Mobile 1">
    </div>
    <div class="carousel-item">
      <img src="{% static 'website/images/featured-image.jpg' %}" class="d-block w-100" alt="Featured">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

<!-- Our mobiles -->
<div class="container my-5 text-center">
  <h2>Our mobiles</h2>
  <div class="row">
    <div class="col-md-6 mb-3">
      <img src="{% static 'website/images/mobile-1.jpg' %}" class="img-fluid" alt="Mobile 1">
      <p>Mobile 1</p>
    </div>
    <div class="col-md-6 mb-3">
      <img src="{% static 'website/images/featured-image.jpg' %}" class="img-fluid" alt="Featured Mobile">
      <p>Featured Mobile</p>
    </div>
  </div>
</div>

<!-- Contact / Product Enquiry -->
<div id="contact-us" class="container-fluid py-5 bg-primary-subtle">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2>Product Enquiry</h2>
      <form id="enquiry">
        <div class="row mb-3">
          <div class="col">
            <label for="first_name" class="form-label text-dark">First Name</label>
            <input type="text" class="form-control" id="first_name" placeholder="Enter your first name">
          </div>
          <div class="col">
            <label for="last_name" class="form-label text-dark">Last Name</label>
            <input type="text" class="form-control" id="last_name" placeholder="Enter your last name">
          </div>
        </div>
        <div class="row mb-3">
          <div class="col">
            <label for="email_address" class="form-label text-dark">Email address</label>
            <input type="email" class="form-control" id="email_address" placeholder="We'll never share your email.">
          </div>
          <div class="col">
            <label for="mobile" class="form-label text-dark">Mobile</label>
            <input type="number" class="form-control" id="mobile" placeholder="We'll never share your mobile number.">
          </div>
        </div>
        <div class="mb-3">
          <label for="product" class="form-label text-dark">Select Mobile</label>
          <select id="product" class="form-select">
            <option selected>Select Mobile</option>
            <option value="Mobile 1">Mobile 1</option>
            <option value="Featured Mobile">Featured Mobile</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="enquiry_message" class="form-label text-dark">Enquiry Message</label>
          <textarea class="form-control" id="enquiry_message" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block test %}
<h1>Test block</h1>
{% endblock %}
